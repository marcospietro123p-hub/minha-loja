<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>
</head>

<body>

<h1>📊 Pedidos</h1>
<div id="lista"></div>

<script>
const API="http://127.0.0.1:8000"

async function carregar(){
 let r=await fetch(API+"/pedidos")
 let dados=await r.json()

 lista.innerHTML=""

 dados.forEach(p=>{
  lista.innerHTML+=`
   <div>
    Pedido #${p[0]} | ${p[1]} | R$ ${p[2]} | ${p[3]}
   </div>`
 })
}

carregar()
</script>

</body>
</html>
