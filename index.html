<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Minha Loja</title>

<style>
body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
    margin:0;
}

h1{margin-top:30px;}

.container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
}

.card{
    background:#1e293b;
    padding:20px;
    margin:15px;
    border-radius:12px;
    width:250px;
}

button{
    padding:12px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    width:100%;
}
</style>
</head>

<body>

<h1>Minha Loja 💰</h1>

<div class="container">

<div class="card">
<h2>Plano Básico</h2>
<p>R$29</p>
<button onclick="comprar('Básico')">Comprar</button>
</div>

<div class="card">
<h2>Plano Pro</h2>
<p>R$59</p>
<button onclick="comprar('Pro')">Comprar</button>
</div>

<div class="card">
<h2>Plano Premium</h2>
<p>R$99</p>
<button onclick="comprar('Premium')">Comprar</button>
</div>

</div>

<script>
function comprar(plano){
 localStorage.setItem("plano",plano)
 window.location.href="sucesso.html"
}
</script>

</body>
</html>
