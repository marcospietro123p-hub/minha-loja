<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Loja</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

header {
  background: black;
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 20px;
}

.produto {
  background: white;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.produto img {
  width: 100%;
  border-radius: 10px;
}

.produto h2 {
  font-size: 18px;
}

.preco {
  color: green;
  font-size: 20px;
  margin: 10px 0;
}

button {
  background: green;
  color: white;
  border: none;
  padding: 10px;
  width: 100%;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: darkgreen;
}
</style>

</head>

<body>

<header>
  <h1>🛒 Minha Loja Online</h1>
</header>

<div class="container">

  <!-- PRODUTO 1 -->
  <div class="produto">
    <img src="https://via.placeholder.com/300">
    <h2>Produto 1</h2>
    <p class="preco">R$ 99,90</p>
    <a href="https://wa.me/27988095353?text=Quero%20comprar%20Produto%201">
      <button>Comprar</button>
    </a>
  </div>

  <!-- PRODUTO 2 -->
  <div class="produto">
    <img src="https://via.placeholder.com/300">
    <h2>Produto 2</h2>
    <p class="preco">R$ 149,90</p>
    <a href="https://wa.me/27988095353?text=Quero%20comprar%20Produto%202">
      <button>Comprar</button>
    </a>
  </div>

  <!-- PRODUTO 3 -->
  <div class="produto">
    <img src="https://via.placeholder.com/300">
    <h2>Produto 3</h2>
    <p class="preco">R$ 79,90</p>
    <a href="https://wa.me/27988095353?text=Quero%20comprar%20Produto%203">
      <button>Comprar</button>
    </a>
  </div>

</div>

</body>
</html>
