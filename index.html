<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha IA</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background:#0f172a;
 color:white;
}

header{
 text-align:center;
 padding:40px;
}

h1{
 font-size:35px;
}

.container{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
 gap:20px;
 padding:20px;
}

.card{
 background:#1e293b;
 padding:20px;
 border-radius:15px;
 text-align:center;
 box-shadow:0 0 15px rgba(0,0,0,0.3);
}

.preco{
 color:#22c55e;
 font-size:25px;
 margin:10px;
}

button{
 background:#22c55e;
 border:none;
 padding:12px;
 width:100%;
 border-radius:10px;
 cursor:pointer;
 font-size:16px;
}

button:hover{
 background:#16a34a;
}

footer{
 text-align:center;
 padding:20px;
 color:#ccc;
}
</style>
</head>

<body>

<header>
<h1>🤖 Acesso Premium à IA</h1>
<p>Desbloqueie todas as funções agora</p>
</header>

<div class="container">

<div class="card">
<h2>Básico</h2>
<p class="preco">R$29</p>
<button onclick="comprar('Básico')">Comprar</button>
</div>

<div class="card">
<h2>Pro</h2>
<p class="preco">R$59</p>
<button onclick="comprar('Pro')">Comprar</button>
</div>

<div class="card">
<h2>Premium</h2>
<p class="preco">R$99</p>
<button onclick="comprar('Premium')">Comprar</button>
</div>

</div>

<footer>
<p>© 2026 Minha IA - Todos os direitos reservados</p>
</footer>

<script>
function comprar(plano){

 let numero = "27988095353"; // 🔴 COLOCA SEU WHATSAPP

 let msg = "Olá, quero comprar o plano " + plano +
 "%0AJá vou pagar via Pix, me envia a chave.";

 window.location.href = "https://wa.me/" + numero + "?text=" + msg;
}
</script>

</body>
</html>
