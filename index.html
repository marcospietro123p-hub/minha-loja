<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Minha Loja</title>

<style>
body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
    margin:0;
}

h1{margin-top:30px;}

.container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
}

.card{
    background:#1e293b;
    padding:20px;
    margin:15px;
    border-radius:12px;
    width:250px;
}

button{
    padding:12px;
    border:none;
    border-radius:10px;
    background:#25D366;
    color:white;
    cursor:pointer;
    width:100%;
    font-size:16px;
}
</style>
</head>

<body>

<h1>Minha Loja 💰</h1>

<div class="container">

<div class="card">
<h2>Plano Básico</h2>
<p>R$29</p>
<button onclick="comprar('Plano diário')">Comprar</button>
</div>

<div class="card">
<h2>Plano Pro</h2>
<p>R$59</p>
<button onclick="comprar('Plano Semanal')">Comprar</button>
</div>

<div class="card">
<h2>Plano Premium</h2>
<p>R$99</p>
<button onclick="comprar('Plano Mensal')">Comprar</button>
</div>

</div>

<script>

// 🔴 COLOCA SEU NÚMERO AQUI
let numero = "27988095353"

// 🔴 COLOCA SEU LINK DA IA AQUI
let linkIA = "https://minha-loja-3.onrender.com/ia.html"

function comprar(plano){

    let mensagem = `Olá, quero comprar o ${plano}.

Pode me enviar mais informações?

Acesso da IA:
${linkIA}`

    let url = "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensagem)

    window.open(url, "_blank")
}

</script>

</body>
</html>
